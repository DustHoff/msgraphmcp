# IMPORTANT: Replace the placeholder values before applying.
# Generate base64 values with:   echo -n 'your-value' | base64
#
# Do NOT commit real credentials to version control.
# Use a secret manager (Sealed Secrets, External Secrets Operator, Vault) in production.
apiVersion: v1
kind: Secret
metadata:
  name: msgraphmcp-azure
  namespace: msgraphmcp
  labels:
    app.kubernetes.io/name: msgraphmcp
    app.kubernetes.io/component: credentials
type: Opaque
data:
  # Required: Azure App Registration client ID
  AZURE_CLIENT_ID: REPLACE_WITH_BASE64_CLIENT_ID
  # Required: Azure tenant ID (or use "common" for multi-tenant)
  AZURE_TENANT_ID: REPLACE_WITH_BASE64_TENANT_ID
  # ── Auth mode (choose ONE of the options below) ───────────────────────────
  #
  # Option A — Client Secret (simpler, rotate every 1–2 years)
  # AZURE_CLIENT_SECRET: REPLACE_WITH_BASE64_CLIENT_SECRET
  #
  # Option B — Client Certificate (preferred for production; no secret rotation)
  # Provide the SHA-256 thumbprint (64 hex chars) from the certificate uploaded
  # to the App Registration.  The PEM private key is mounted separately as a
  # volume (see deployment.yaml).
  # AZURE_CLIENT_CERTIFICATE_THUMBPRINT: REPLACE_WITH_BASE64_SHA256_THUMBPRINT
  #
  # If neither option is set the server falls back to the device code flow
  # (interactive browser login — not recommended in containers running under
  # Entra ID Conditional Access device-compliance policies).
