# IMPORTANT: Replace the placeholder values before applying.
# Generate base64 values with:   echo -n 'your-value' | base64
#
# Do NOT commit real credentials to version control.
# Use a secret manager (Sealed Secrets, External Secrets Operator, Vault) in production.
apiVersion: v1
kind: Secret
metadata:
  name: msgraphmcp-azure
  namespace: msgraphmcp
  labels:
    app.kubernetes.io/name: msgraphmcp
    app.kubernetes.io/component: credentials
type: Opaque
data:
  # Required: Azure App Registration client ID
  AZURE_CLIENT_ID: REPLACE_WITH_BASE64_CLIENT_ID
  # Required: Azure tenant ID (or use "common" for multi-tenant)
  AZURE_TENANT_ID: REPLACE_WITH_BASE64_TENANT_ID
  # Optional: client secret (only for confidential app registrations)
  # AZURE_CLIENT_SECRET: REPLACE_WITH_BASE64_CLIENT_SECRET
