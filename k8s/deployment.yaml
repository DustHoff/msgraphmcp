apiVersion: apps/v1
kind: Deployment
metadata:
  name: msgraphmcp
  namespace: msgraphmcp
  labels:
    app.kubernetes.io/name: msgraphmcp
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: msgraphmcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: msgraphmcp
        app.kubernetes.io/version: "1.0.0"
    spec:
      # ── ARM64 node placement ──────────────────────────────────────────────
      nodeSelector:
        kubernetes.io/arch: arm64

      # If your arm64 nodes carry a dedicated taint, add a matching toleration.
      # Common examples (uncomment the one that matches your cluster):
      tolerations:
        - key: "kubernetes.io/arch"
          operator: "Equal"
          value: "arm64"
          effect: "NoSchedule"
        # - key: "node-role.kubernetes.io/arm"
        #   operator: "Exists"
        #   effect: "NoSchedule"

      # ── Security ──────────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000        # matches the `node` user in node:20-alpine
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: msgraphmcp
          image: ghcr.io/dusthoff/msgraphmcp:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            # Enable HTTP transport (Kubernetes mode)
            - name: PORT
              value: "8080"
            - name: TOKEN_CACHE_PATH
              value: /data/tokens.json
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            # Azure credentials from Secret
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: msgraphmcp-azure
                  key: AZURE_CLIENT_ID
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: msgraphmcp-azure
                  key: AZURE_TENANT_ID
            # ── Auth mode: uncomment ONE of the blocks below ────────────────
            #
            # Option A — Authorization Code + PKCE (delegated, recommended for HTTP mode)
            # Requires: AZURE_CLIENT_SECRET + AZURE_REDIRECT_URI.
            # Register https://<your-host>/auth/callback as a redirect URI in Entra ID.
            # After deploying, visit https://<your-host>/auth/login to authenticate.
            # - name: AZURE_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: msgraphmcp-azure
            #       key: AZURE_CLIENT_SECRET
            # - name: AZURE_REDIRECT_URI
            #   value: https://msgraph.os.hoffnet.onesi.de/auth/callback
            #
            # Option B — Client Secret / app-only (no user context, needs Application permissions)
            # - name: AZURE_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: msgraphmcp-azure
            #       key: AZURE_CLIENT_SECRET
            #
            # Option C — Client Certificate (app-only, preferred for production)
            # Step 1: store the SHA-256 thumbprint in the Secret (secret.yaml)
            # Step 2: mount the PEM private key as a file (see volumes below)
            # - name: AZURE_CLIENT_CERTIFICATE_PATH
            #   value: /mnt/cert/tls.key
            # - name: AZURE_CLIENT_CERTIFICATE_THUMBPRINT
            #   valueFrom:
            #     secretKeyRef:
            #       name: msgraphmcp-azure
            #       key: AZURE_CLIENT_CERTIFICATE_THUMBPRINT

          volumeMounts:
            - name: token-cache
              mountPath: /data
            # Uncomment for Option B (client certificate):
            # - name: client-cert
            #   mountPath: /mnt/cert
            #   readOnly: true

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # ── Probes ─────────────────────────────────────────────────────────
          # start-period covers the one-time device-code authentication flow
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60    # 60 × 5 s = 5 min for first auth
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # false because npm writes to node_modules at runtime
            capabilities:
              drop:
                - ALL

      volumes:
        - name: token-cache
          persistentVolumeClaim:
            claimName: msgraphmcp-token-cache
        # Uncomment for Option B (client certificate).
        # Create a Kubernetes Secret named "msgraphmcp-client-cert" containing
        # the PEM private key under the key "tls.key", then uncomment below:
        # - name: client-cert
        #   secret:
        #     secretName: msgraphmcp-client-cert
        #     defaultMode: 0400

      restartPolicy: Always
