name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

# Opt into Node.js 24 for all actions (avoids the Node.js 20 deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-fund
        env:
          NPM_CONFIG_LOGLEVEL: error

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Build (esbuild)
        run: npm run build

      - name: Verify binary starts
        run: node dist/index.js 2>&1 | grep -q "AZURE_CLIENT_ID" && echo "Binary OK"
